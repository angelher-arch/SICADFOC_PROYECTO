# SICADFOC 2026 - Configuración de Despliegue en Render
# Infrastructure as Code para automatización completa

services:
  # Servicio Web Principal
  - type: web
    name: sicadfoc-app
    runtime: python
    plan: free
    repo: https://github.com/tu-usuario/sicadfoc-2026.git
    region: oregon
    
    # Configuración de Build
    buildCommand: pip install -r requirements.txt
    
    # Comando de Inicio
    startCommand: streamlit run main.py --server.port $PORT --server.address 0.0.0.0
    
    # Variables de Entorno (Placeholders - Configurar en Panel de Render)
    envVars:
      # Base de Datos PostgreSQL
      - key: DATABASE_URL
        value: "postgresql://usuario:password@host:port/database"
        sync: false
      
      # Configuración de Correo SMTP
      - key: SMTP_USER
        value: "tu-correo@gmail.com"
        sync: false
        
      - key: SMTP_PASSWORD
        value: "tu-contraseña-de-aplicación"
        sync: false
        
      - key: SMTP_SERVER
        value: "smtp.gmail.com"
        sync: false
        
      - key: SMTP_PORT
        value: "587"
        sync: false
      
      # Seguridad y Aplicación
      - key: SECRET_KEY
        value: "tu-secret-key-generado-aleatoriamente"
        sync: false
        
      - key: RENDER_DEPLOY_HOOK_URL
        value: "https://api.render.com/deploy/srv-xxxxx?key=xxxxx"
        sync: false
      
      # Configuración de Streamlit
      - key: STREAMLIT_SERVER_PORT
        value: "$PORT"
        sync: false
        
      - key: STREAMLIT_SERVER_ADDRESS
        value: "0.0.0.0"
        sync: false
    
    # Configuración de Health Check
    healthCheckPath: /
    
    # Configuración de Auto-Deploy
    autoDeploy: true
    
    # Configuración de RAM y CPU
    numInstances: 1
    scaling:
      minInstances: 1
      maxInstances: 1
      targetCPUPercent: 70
      targetMemoryPercent: 80
    
    # Configuración de Disco
    disk:
      name: sicadfoc-disk
      mountPath: /app/data
      sizeGB: 1

# Configuración de Base de Datos PostgreSQL (Opcional - si Render DB)
databases:
  - name: sicadfoc-db
    databaseName: sicadfoc
    user: sicadfoc_user
    plan: free
    region: oregon
    
# Configuración de Variables Globales
version: "1.0"
environment: production

# Notas de Configuración:
# 1. Reemplaza 'tu-usuario' con tu usuario real de GitLab
# 2. Configura las variables de entorno en el panel de Render
# 3. Ajusta el plan según tus necesidades (free, starter, etc.)
# 4. La base de datos se puede configurar aquí o usar externa
